# Ollama Pod + Deployment for nomic-embed-text v1.5
# Size: ~274MB (model weights) + ~500MB runtime = ~800MB total
# Memory: Request 1Gi, Limit 2Gi
# CPU: Works fine on CPU (no GPU required)
# GPU: Optional, small model (274MB) fits on any GPU with >1GB VRAM

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models-pvc
  namespace: default
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: embedding-backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: standard  # Adjust to your cluster default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-embed
  namespace: default
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: embedding-backend
    app.kubernetes.io/version: "1.5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
      app.kubernetes.io/component: embedding-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/component: embedding-backend
    spec:
      # Pull model on startup via init container
      initContainers:
        - name: ollama-pull
          image: ollama/ollama:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Ollama daemon..."
              # Start the server in background
              ollama serve &
              sleep 5
              # Wait for it to be ready
              for i in $(seq 1 30); do
                if curl -s http://localhost:11434/api/tags >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              echo "Pulling nomic-embed-text:v1.5..."
              ollama pull nomic-embed-text:v1.5
              echo "Done!"
              # Keep alive until main container takes over
              sleep 60
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: 1000m
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: 1Gi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: 2000m
          # Uncomment to enable GPU for NVIDIA
          # resources:
          #   requests:
          #     memory: 1Gi
          #     cpu: 250m
          #     nvidia.com/gpu: 1
          #   limits:
          #     memory: 2Gi
          #     cpu: 2000m
          #     nvidia.com/gpu: 1
          # Uncomment to enable GPU for AMD (requires ROCm device plugin)
          # resources:
          #   requests:
          #     memory: 1Gi
          #     cpu: 250m
          #     amd.com/gpu: 1
          #   limits:
          #     memory: 2Gi
          #     cpu: 2000m
          #     amd.com/gpu: 1
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-embed
  namespace: default
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: embedding-backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 11434
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: embedding-backend
---
