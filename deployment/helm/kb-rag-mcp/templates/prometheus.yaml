{{- if and .Values.monitoring.enabled .Values.monitoring.prometheus.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kb-rag-mcp.fullname" . }}-prometheus
  labels:
    {{- include "kb-rag-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  type: {{ .Values.monitoring.prometheus.service.type }}
  ports:
    - port: {{ .Values.monitoring.prometheus.service.port }}
      targetPort: 9090
      protocol: TCP
      name: http
  selector:
    {{- include "kb-rag-mcp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kb-rag-mcp.fullname" . }}-prometheus
  labels:
    {{- include "kb-rag-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  serviceName: {{ include "kb-rag-mcp.fullname" . }}-prometheus
  replicas: 1
  selector:
    matchLabels:
      {{- include "kb-rag-mcp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: prometheus
  template:
    metadata:
      labels:
        {{- include "kb-rag-mcp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: prometheus
    spec:
      containers:
        - name: prometheus
          image: "{{ .Values.monitoring.prometheus.image.repository }}:{{ .Values.monitoring.prometheus.image.tag }}"
          imagePullPolicy: {{ .Values.monitoring.prometheus.image.pullPolicy }}
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time={{ .Values.monitoring.prometheus.retention }}'
            - '--web.console.libraries=/usr/share/prometheus/console_libraries'
            - '--web.console.templates=/usr/share/prometheus/consoles'
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.monitoring.prometheus.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: {{ include "kb-rag-mcp.fullname" . }}-prometheus-config
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.monitoring.prometheus.storage.storageClass }}
        storageClassName: {{ .Values.monitoring.prometheus.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.monitoring.prometheus.storage.size }}
{{- end }}
