{{- if and .Values.monitoring.enabled .Values.monitoring.prometheus.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kb-rag-mcp.fullname" . }}-prometheus-config
  labels:
    {{- include "kb-rag-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.monitoring.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.monitoring.prometheus.scrapeInterval }}
      external_labels:
        cluster: '{{ .Release.Name }}'
        service: 'kb-rag'

    scrape_configs:
      - job_name: 'kb-rag'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: {{ include "kb-rag-mcp.name" . }}
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: drop
            regex: (prometheus|grafana)
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: ${1}:8081
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
        metrics_path: '/metrics'
{{- end }}
---
{{- if and .Values.monitoring.enabled .Values.monitoring.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kb-rag-mcp.fullname" . }}-grafana-datasources
  labels:
    {{- include "kb-rag-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "kb-rag-mcp.fullname" . }}-prometheus:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "{{ .Values.monitoring.prometheus.scrapeInterval }}"
          httpMethod: "POST"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kb-rag-mcp.fullname" . }}-grafana-dashboards-provisioning
  labels:
    {{- include "kb-rag-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  kb-rag.yml: |
    apiVersion: 1
    providers:
      - name: 'KB-RAG Dashboards'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kb-rag-mcp.fullname" . }}-grafana-dashboards
  labels:
    {{- include "kb-rag-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  grafana-dashboard.json: |
{{ .Files.Get "dashboards/grafana-dashboard.json" | indent 4 }}
{{- end }}
