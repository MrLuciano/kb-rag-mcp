{{- /*
Ollama Deployment for embedding backend
Model: nomic-embed-text:v1.5 (274MB)
Memory: ~1Gi total (274MB model + 500MB overhead)
*/ -}}
{{- if .Values.ollama.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "kb-rag-mcp.fullname" . }}-ollama-models
  labels:
    {{- include "kb-rag-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  accessModes:
    - {{ .Values.ollama.persistence.accessMode | default "ReadWriteOnce" }}
  {{- if .Values.ollama.persistence.storageClass }}
  storageClassName: {{ .Values.ollama.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.ollama.persistence.size | default "5Gi" }}
---
{{- if .Values.ollama.initPullModel }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kb-rag-mcp.fullname" . }}-ollama-init
  labels:
    {{- include "kb-rag-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama-init
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  template:
    metadata:
      labels:
        {{- include "kb-rag-mcp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ollama-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ollama-pull
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting Ollama daemon..."
              ollama serve &
              sleep 5
              for i in $(seq 1 60); do
                if curl -s http://localhost:11434/api/tags >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              echo "Pulling {{ .Values.ollama.model }}..."
              ollama pull {{ .Values.ollama.model }}
              echo "Pull complete!"
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: {{ .Values.ollama.resources.requests.memory | default "512Mi" }}
              cpu: {{ .Values.ollama.resources.requests.cpu | default "250m" }}
            limits:
              memory: {{ .Values.ollama.resources.limits.memory | default "2Gi" }}
              cpu: {{ .Values.ollama.resources.limits.cpu | default "1000m" }}
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: {{ include "kb-rag-mcp.fullname" . }}-ollama-models
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kb-rag-mcp.fullname" . }}-ollama
  labels:
    {{- include "kb-rag-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  replicas: {{ .Values.ollama.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "kb-rag-mcp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ollama
  template:
    metadata:
      labels:
        {{- include "kb-rag-mcp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ollama
    spec:
      {{- if .Values.ollama.initPullModel }}
      initContainers:
        - name: ollama-pull
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting Ollama daemon..."
              ollama serve &
              sleep 5
              for i in $(seq 1 60); do
                if curl -s http://localhost:11434/api/tags >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              echo "Pulling {{ .Values.ollama.model }}..."
              ollama pull {{ .Values.ollama.model }}
              echo "Pull complete!"
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: {{ .Values.ollama.resources.requests.memory | default "512Mi" }}
              cpu: {{ .Values.ollama.resources.requests.cpu | default "250m" }}
            limits:
              memory: {{ .Values.ollama.resources.limits.memory | default "2Gi" }}
              cpu: {{ .Values.ollama.resources.limits.cpu | default "1000m" }}
      {{- end }}
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.ollama.service.port }}
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:{{ .Values.ollama.service.port }}"
            - name: OLLAMA_KEEP_ALIVE
              value: "{{ .Values.ollama.keepAlive }}"
            - name: OLLAMA_NUM_PARALLEL
              value: "{{ .Values.ollama.numParallel }}"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "{{ .Values.ollama.maxLoadedModels }}"
          {{- if .Values.ollama.gpu.enabled }}
            {{- if eq .Values.ollama.gpu.vendor "nvidia" }}
            - name: OLLAMA_CUDA
              value: "1"
            {{- else if eq .Values.ollama.gpu.vendor "amd" }}
            - name: OLLAMA_HIP
              value: "1"
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          {{- if .Values.ollama.gpu.enabled }}
          resources:
            requests:
              memory: {{ .Values.ollama.resources.requests.memory | default "1Gi" }}
              cpu: {{ .Values.ollama.resources.requests.cpu | default "250m" }}
              {{- if eq .Values.ollama.gpu.vendor "nvidia" }}
              nvidia.com/gpu: {{ .Values.ollama.gpu.count | default 1 }}
              {{- else if eq .Values.ollama.gpu.vendor "amd" }}
              amd.com/gpu: {{ .Values.ollama.gpu.count | default 1 }}
              {{- end }}
            limits:
              memory: {{ .Values.ollama.resources.limits.memory | default "2Gi" }}
              cpu: {{ .Values.ollama.resources.limits.cpu | default "2000m" }}
              {{- if eq .Values.ollama.gpu.vendor "nvidia" }}
              nvidia.com/gpu: {{ .Values.ollama.gpu.count | default 1 }}
              {{- else if eq .Values.ollama.gpu.vendor "amd" }}
              amd.com/gpu: {{ .Values.ollama.gpu.count | default 1 }}
              {{- end }}
          {{- end }}
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: {{ include "kb-rag-mcp.fullname" . }}-ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kb-rag-mcp.fullname" . }}-ollama
  labels:
    {{- include "kb-rag-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  type: {{ .Values.ollama.service.type | default "ClusterIP" }}
  ports:
    - name: http
      port: {{ .Values.ollama.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "kb-rag-mcp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
{{- end }}
