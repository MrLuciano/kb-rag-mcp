{{- /*
Qdrant StatefulSet + PersistentVolumeClaim
*/ -}}
{{- if .Values.qdrant.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kb-rag-mcp.fullname" . }}-qdrant
  labels:
    {{- include "kb-rag-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ include "kb-rag-mcp.fullname" . }}-qdrant
  replicas: 1
  selector:
    matchLabels:
      {{- include "kb-rag-mcp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        {{- include "kb-rag-mcp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: qdrant
    spec:
      containers:
        - name: qdrant
          image: "{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
          imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.qdrant.service.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.qdrant.service.grpcPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
  {{- if .Values.qdrant.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: qdrant-data
      spec:
        accessModes:
          - {{ .Values.qdrant.persistence.accessMode }}
        storageClassName: {{ .Values.qdrant.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.qdrant.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kb-rag-mcp.fullname" . }}-qdrant
  labels:
    {{- include "kb-rag-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  type: ClusterIP
  clusterIP: None  # headless for StatefulSet DNS
  ports:
    - name: http
      port: {{ .Values.qdrant.service.port }}
      targetPort: http
    - name: grpc
      port: {{ .Values.qdrant.service.grpcPort }}
      targetPort: grpc
  selector:
    {{- include "kb-rag-mcp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
{{- end }}
