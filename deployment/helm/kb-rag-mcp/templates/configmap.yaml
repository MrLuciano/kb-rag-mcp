{{- /*
ConfigMap — environment variables for kb-server
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kb-rag-mcp.fullname" . }}-config
  labels:
    {{- include "kb-rag-mcp.labels" . | nindent 4 }}
data:
  TRANSPORT: {{ .Values.config.transport | quote }}
  QDRANT_COLLECTION: {{ .Values.config.qdrantCollection | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  QUERY_LOG_ENABLED: {{ .Values.config.querLogEnabled | quote }}
