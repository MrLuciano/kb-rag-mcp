# Default values for kb-rag-mcp.
# Override with: helm install kb-rag-mcp ./deployment/helm/kb-rag-mcp -f my-values.yaml

# ── KB Server ────────────────────────────────────────────────────────────────
replicaCount: 2

image:
  repository: kb-rag-mcp
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000          # MCP SSE / FastAPI
  healthPort: 8081    # /health and /metrics

# Environment configuration passed as a ConfigMap
config:
  transport: sse
  qdrantCollection: kb_docs
  logLevel: INFO
  querLogEnabled: "true"

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

# ── Horizontal Pod Autoscaler ─────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Qdrant ───────────────────────────────────────────────────────────────────
qdrant:
  enabled: true
  image:
    repository: qdrant/qdrant
    tag: "v1.9.0"
    pullPolicy: IfNotPresent
  service:
    port: 6333
    grpcPort: 6334
  persistence:
    enabled: true
    size: 50Gi
    storageClass: standard
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 8Gi

# ── Redis (optional) ─────────────────────────────────────────────────────────
redis:
  enabled: false
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  persistence:
    enabled: true
    size: 2Gi
    storageClass: standard
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Ollama (embedding backend) ───────────────────────────────────────────────
ollama:
  enabled: false
  model: "nomic-embed-text:v1.5"
  replicas: 1
  initPullModel: true
  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 11434
  persistence:
    enabled: true
    size: 5Gi
    storageClass: standard
    accessMode: ReadWriteOnce
  keepAlive: "24h"
  numParallel: 1
  maxLoadedModels: 1
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  # GPU acceleration (optional, nomic-embed-text works fine on CPU)
  gpu:
    enabled: false
    vendor: nvidia  # or "amd" for ROCm
    count: 1

# ── Prometheus / Grafana (monitoring) ────────────────────────────────────────
monitoring:
  enabled: true
  # Set to true to create a ServiceMonitor (requires prometheus-operator)
  serviceMonitor:
    enabled: false
    namespace: monitoring
    interval: 30s

  prometheus:
    enabled: true
    image:
      repository: prom/prometheus
      tag: latest
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 9090
    storage:
      size: 10Gi
      storageClass: ""  # Use cluster default
    retention: 15d
    scrapeInterval: 15s
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

  grafana:
    enabled: true
    image:
      repository: grafana/grafana
      tag: latest
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3000
    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts:
        - host: grafana.local
          paths:
            - path: /
              pathType: Prefix
      tls: []
    adminUser: admin
    adminPassword: admin  # Change in production via --set
    anonymousAccess: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: kb-rag-mcp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ── Pod settings ──────────────────────────────────────────────────────────────
podAnnotations: {}
podSecurityContext: {}
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false

nodeSelector: {}
tolerations: []
affinity: {}
