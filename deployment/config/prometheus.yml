# Prometheus Configuration for KB-RAG
#
# Add this to your Prometheus configuration to scrape KB-RAG metrics.
#
# Usage:
#   1. Copy this file to your Prometheus config directory
#   2. Include it in your main prometheus.yml:
#      - job_name: 'kb-rag'
#        file_sd_configs:
#          - files:
#            - 'kb-rag-targets.yml'
#
# Or add directly to prometheus.yml scrape_configs section.
#
# Docker Compose note:
#   - Prometheus must scrape the service over the internal Compose network using
#     the service name, e.g. http://kb-rag-mcp:8080/metrics
#   - External clients outside the Compose network should use the published host
#     port, e.g. http://localhost:8080/metrics or http://<docker-host>:8080/metrics
#   - Do not rewrite the scrape target into a ?target=... query parameter unless
#     you are intentionally configuring a blackbox exporter

# Global settings
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'production'
    service: 'kb-rag'

# Scrape KB-RAG health server metrics
scrape_configs:
  - job_name: 'kb-rag'
    static_configs:
      - targets:
          - 'kb-rag-mcp:8080'
        labels:
          service: 'kb-rag'
          component: 'health-server'

    # Scrape /metrics endpoint
    metrics_path: '/metrics'

    # Scrape interval
    scrape_interval: 10s
    scrape_timeout: 5s

    # Preserve the original target as the instance label
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

# Alerting rules
rule_files:
  - 'kb-rag-alerts.yml'

# Alert manager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'
