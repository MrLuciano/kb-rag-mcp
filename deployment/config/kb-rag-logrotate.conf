# Logrotate configuration for KB-RAG
#
# Install:
#   sudo cp kb-rag-logrotate.conf /etc/logrotate.d/kb-rag
#
# Test:
#   sudo logrotate -d /etc/logrotate.d/kb-rag
#

/opt/kb-rag/logs/*.log {
    # Rotate daily
    daily
    
    # Keep 14 days of logs
    rotate 14
    
    # Compress old logs
    compress
    delaycompress
    
    # Don't rotate if empty
    notifempty
    
    # Don't fail if log missing
    missingok
    
    # Create new log file with these permissions
    create 0640 kb-rag kb-rag
    
    # Use date as suffix
    dateext
    dateformat -%Y%m%d
    
    # Share rotation across all matching files
    sharedscripts
    
    # Reload services after rotation
    postrotate
        # Signal services to reopen log files
        systemctl reload kb-rag-server.service >/dev/null 2>&1 || true
        systemctl reload kb-rag-health.service >/dev/null 2>&1 || true
    endscript
    
    # Additional options
    maxsize 100M
    minsize 1M
}

# Separate rules for high-frequency logs
/opt/kb-rag/logs/access.log {
    daily
    rotate 7
    compress
    delaycompress
    notifempty
    missingok
    create 0640 kb-rag kb-rag
    dateext
    maxsize 500M
    
    sharedscripts
    postrotate
        systemctl reload kb-rag-server.service >/dev/null 2>&1 || true
    endscript
}
