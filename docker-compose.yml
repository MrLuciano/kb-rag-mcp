# kb-rag-mcp Docker Compose — Core services
# Optional: Add Ollama for local embedding backend:
#   docker compose -f docker-compose.yml -f deployment/docker-compose/ollama.yml up -d
#
# Optional: Add Redis for caching:
#   docker compose -f docker-compose.yml -f deployment/docker-compose/redis.yml up -d

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kb-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - ${QDRANT_DATA_PATH:-./data/qdrant}:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M

  kb-rag-mcp:
    build: .
    container_name: kb-rag-mcp
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "${SSE_PORT:-8765}:${SSE_PORT:-8765}"   # MCP SSE endpoint
      - "${HEALTH_PORT:-8080}:${HEALTH_PORT:-8080}"   # Health/metrics HTTP
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - LOG_PATH=/app/logs/kb-mcp.log
      - SSE_HOST=0.0.0.0
      - SSE_PORT=${SSE_PORT:-8765}
      - HEALTH_HOST=0.0.0.0
      - HEALTH_PORT=${HEALTH_PORT:-8080}
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${LOGS_DIR:-./logs}:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "-q", "http://localhost:${HEALTH_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M

  web-ui:
    build: .
    container_name: kb-web-ui
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "${UI_PORT:-8001}:${UI_PORT:-8001}"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - KB_METADATA_DB=/app/data/registry.db
      - UI_HOST=0.0.0.0
      - UI_PORT=${UI_PORT:-8001}
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${LOGS_DIR:-./logs}:/app/logs
    entrypoint: ["python", "-m", "kb_server.ui.run_ui"]
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "-q", "http://localhost:${UI_PORT:-8001}/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 128M

  prometheus:
    image: prom/prometheus:latest
    container_name: kb-prometheus
    restart: unless-stopped
    depends_on:
      kb-rag-mcp:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    container_name: kb-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployment/config/grafana-provisioning:/etc/grafana/provisioning:ro
      - ./deployment/config/grafana-dashboard.json:/etc/grafana/dashboards/grafana-dashboard.json:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_ALLOW_SIGN_UP=false
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  prometheus-data:
  grafana-data:
