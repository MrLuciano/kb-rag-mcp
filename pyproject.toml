[tool.black]
line-length = 79
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 79

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "strict"
pythonpath = ["."]
testpaths = ["tests"]
filterwarnings = [
    "ignore::pytest.PytestUnknownMarkWarning",
]
markers = [
    "integration: Tests that require live infrastructure (Qdrant, LM Studio, Redis). Skipped via `pytest -m 'not integration'`.",
    "fase12: Tests targeting FASE 12 features (hybrid search, reranking).",
    "cli: CLI integration tests that exercise click commands end-to-end.",
]

[tool.coverage.run]
branch = true

[tool.coverage.report]
fail_under = 90
show_missing = true
skip_covered = false
