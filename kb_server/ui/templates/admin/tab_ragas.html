<h2 class="h3">RAGAS Evaluation</h2>
<p class="text-muted">Golden dataset and evaluation metrics.</p>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h3 class="h5 card-title">Evaluation Dataset</h3>
                <p class="text-muted small">
                    {{ dataset_count }} evaluation queries available.
                </p>
                <button class="btn btn-primary btn-sm"
                        hx-post="/admin/tabs/ragas-run"
                        hx-target="#ragas-result"
                        hx-swap="innerHTML"
                        hx-confirm="Run evaluation? This may take several minutes.">
                    <span class="btn-text">Run Evaluation</span>
                    <span class="spinner-border spinner-border-sm d-none" id="ragas-spinner" role="status" aria-hidden="true"></span>
                </button>
                <div id="ragas-result" class="mt-3"></div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h3 class="h5 card-title">Last Run</h3>
                <p class="text-muted" id="ragas-last-run">
                    No evaluation results yet. Run an evaluation to see results here.
                </p>
            </div>
        </div>
    </div>
</div>

<script nonce="{{ get_nonce(request) }}">
    var ragasBtn = document.querySelector('button[hx-post="/admin/tabs/ragas-run"]');
    if (ragasBtn) {
        ragasBtn.addEventListener('htmx:beforeRequest', function() {
            var spinner = document.getElementById('ragas-spinner');
            var btnText = ragasBtn.querySelector('.btn-text');
            ragasBtn.disabled = true;
            btnText.classList.add('d-none');
            spinner.classList.remove('d-none');
        });
        ragasBtn.addEventListener('htmx:afterRequest', function() {
            var spinner = document.getElementById('ragas-spinner');
            var btnText = ragasBtn.querySelector('.btn-text');
            ragasBtn.disabled = false;
            btnText.classList.remove('d-none');
            spinner.classList.add('d-none');
        });
    }
</script>
