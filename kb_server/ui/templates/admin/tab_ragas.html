<h2 class="h3">RAGAS Evaluation</h2>
<p class="text-muted">Golden dataset and evaluation metrics.</p>

<div x-data="ragasTab">
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link" :class="{ active: activeTab === 'editor' }" href="#"
               data-action="ragas-switch-tab" data-tab="editor">Editor</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" :class="{ active: activeTab === 'results' }" href="#"
               data-action="ragas-switch-tab" data-tab="results">Results</a>
        </li>
    </ul>

    <div id="ragas-content"
         hx-get="/admin/tabs/ragas-editor"
         hx-trigger="load"
         hx-swap="innerHTML">
        <div class="text-center text-muted py-3">
            <div class="spinner-border spinner-border-sm" role="status"></div>
            <span class="ms-2">Loading...</span>
        </div>
    </div>
</div>
