<h2 class="h3">Monitoring</h2>
<p class="text-muted">System health and Grafana dashboards.</p>

<!-- Monitor Lights -->
<div id="monitor-lights"
     hx-get="/admin/tabs/monitor-lights"
     hx-trigger="every 30s"
     hx-target="this"></div>

<hr>

<!-- Grafana Embed -->
{% set grafana_url = build_grafana_embed_url() %}
{% if grafana_url %}
<div x-data="{ timeRange: '6h', url: '{{ build_grafana_embed_url_with_range("6h") }}' }">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h3 class="h5 mb-0">Grafana Dashboard</h3>
        <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-secondary"
                    :class="{ 'active': timeRange === '1h' }"
                    @click="timeRange = '1h'; url = '{{ build_grafana_embed_url_with_range("1h") }}'">1h</button>
            <button class="btn btn-outline-secondary"
                    :class="{ 'active': timeRange === '6h' }"
                    @click="timeRange = '6h'; url = '{{ build_grafana_embed_url_with_range("6h") }}'">6h</button>
            <button class="btn btn-outline-secondary"
                    :class="{ 'active': timeRange === '24h' }"
                    @click="timeRange = '24h'; url = '{{ build_grafana_embed_url_with_range("24h") }}'">24h</button>
            <button class="btn btn-outline-secondary"
                    :class="{ 'active': timeRange === '7d' }"
                    @click="timeRange = '7d'; url = '{{ build_grafana_embed_url_with_range("7d") }}'">7d</button>
        </div>
    </div>
    <iframe :src="url" width="100%" height="600" frameborder="0"></iframe>
</div>
{% else %}
<div class="alert alert-info">
    Grafana not configured. Set <code>GRAFANA_URL</code> and
    <code>GRAFANA_DASHBOARD_UID</code> env vars.
</div>
{% endif %}
