<h2 class="h3">Ingestion</h2>
<p class="text-muted">Manual ingest trigger and job status.</p>

<div x-data="ingestionTab">
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link" :class="{ active: activeTab === 'manual' }" href="#"
               data-action="ingestion-switch-tab" data-tab="manual">Manual</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" :class="{ active: activeTab === 'schedule' }" href="#"
               data-action="ingestion-switch-tab" data-tab="schedule">Schedule</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" :class="{ active: activeTab === 'monitor' }" href="#"
               data-action="ingestion-switch-tab" data-tab="monitor">Monitor</a>
        </li>
    </ul>

    <div id="ingestion-content"
         hx-get="/admin/tabs/ingestion-manual"
         hx-trigger="load"
         hx-swap="innerHTML">
        <div class="text-center text-muted py-3">
            <div class="spinner-border spinner-border-sm" role="status"></div>
            <span class="ms-2">Loading...</span>
        </div>
    </div>
</div>
