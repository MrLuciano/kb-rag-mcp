<h2 class="h3">Ingestion</h2>
<p class="text-muted">Manual ingest trigger and job status.</p>

<div x-data="{ activeIngestionTab: 'manual' }">
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link" :class="{ active: activeIngestionTab === 'manual' }" href="#"
               @click.prevent="activeIngestionTab = 'manual'; htmx.ajax('GET', '/admin/tabs/ingestion-manual', {target: '#ingestion-content', swap: 'innerHTML'})">Manual</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" :class="{ active: activeIngestionTab === 'schedule' }" href="#"
               @click.prevent="activeIngestionTab = 'schedule'; htmx.ajax('GET', '/admin/tabs/ingestion-schedule', {target: '#ingestion-content', swap: 'innerHTML'})">Schedule</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" :class="{ active: activeIngestionTab === 'monitor' }" href="#"
               @click.prevent="activeIngestionTab = 'monitor'; htmx.ajax('GET', '/admin/tabs/ingestion-monitor', {target: '#ingestion-content', swap: 'innerHTML'})">Monitor</a>
        </li>
    </ul>

    <div id="ingestion-content"
         hx-get="/admin/tabs/ingestion-manual"
         hx-trigger="load"
         hx-swap="innerHTML">
        <div class="text-center text-muted py-3">
            <div class="spinner-border spinner-border-sm" role="status"></div>
            <span class="ms-2">Loading...</span>
        </div>
    </div>
</div>
