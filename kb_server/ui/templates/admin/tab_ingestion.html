<h2 class="h3">Ingestion</h2>
<p class="text-muted">Manual ingest trigger and job status.</p>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h3 class="h5 card-title">Quick Ingest</h3>
                <p class="text-muted small">Enter a directory path to start ingestion.</p>
                <form hx-post="/admin/tabs/ingest-trigger"
                      hx-target="#ingest-result"
                      hx-swap="innerHTML">
                    <div class="mb-3">
                        <input type="text" class="form-control" name="path"
                               placeholder="/path/to/docs" required>
</div>

<script>
    var ingestForm = document.querySelector('form[hx-post="/admin/tabs/ingest-trigger"]');
    if (ingestForm) {
        ingestForm.addEventListener('htmx:beforeRequest', function() {
            var btn = ingestForm.querySelector('button[type="submit"]');
            var spinner = document.getElementById('ingest-spinner');
            var btnText = btn.querySelector('.btn-text');
            btn.disabled = true;
            btnText.classList.add('d-none');
            spinner.classList.remove('d-none');
        });
        ingestForm.addEventListener('htmx:afterRequest', function() {
            var btn = ingestForm.querySelector('button[type="submit"]');
            var spinner = document.getElementById('ingest-spinner');
            var btnText = btn.querySelector('.btn-text');
            btn.disabled = false;
            btnText.classList.remove('d-none');
            spinner.classList.add('d-none');
        });
    }
</script>
                    <button type="submit" class="btn btn-primary btn-sm">
                        <span class="btn-text">Start Ingest</span>
                        <span class="spinner-border spinner-border-sm d-none" id="ingest-spinner" role="status" aria-hidden="true"></span>
                    </button>
                </form>
                <div id="ingest-result" class="mt-2"></div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div id="job-status"
             hx-get="/admin/tabs/job-status"
             hx-trigger="load, every 10s"
             hx-swap="innerHTML">
            <div class="text-muted">Loading job status...</div>
        </div>
    </div>
</div>
