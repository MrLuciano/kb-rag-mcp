<div x-data="userManager">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="h3 mb-1">Users</h2>
            <p class="text-muted mb-0">Manage user accounts and their API keys.</p>
        </div>
        <button class="btn btn-primary"
                x-on:click="showCreateForm = !showCreateForm"
                x-text="showCreateForm ? 'Cancel' : 'Create User'"></button>
    </div>

    <div x-show="showCreateForm" x-cloak class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Create New User</h5>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" x-model="newUser.username" placeholder="Login name">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" x-model="newUser.email" placeholder="user@example.com">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Role</label>
                    <select class="form-select" x-model="newUser.role">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
            </div>
            <div x-show="createError" class="alert alert-danger mt-3 py-2 small" x-text="createError" x-cloak></div>
            <button class="btn btn-success mt-3" x-on:click="createUser()" :disabled="creating">
                <span x-show="creating" class="spinner-border spinner-border-sm me-1" role="status"></span>
                <span x-text="creating ? 'Creating...' : 'Create User & Generate API Key'"></span>
            </button>
        </div>
    </div>

    <div x-show="showNewKey" x-cloak class="alert alert-success">
        <strong>User created successfully!</strong><br>
        <span class="small">API Key for this user (show once):</span>
        <div class="input-group mt-2">
            <input type="text" class="form-control font-monospace" :value="newKey" readonly id="new-api-key-input">
            <button class="btn btn-outline-secondary" type="button"
                    x-on:click="copyKey()">Copy</button>
        </div>
        <button class="btn btn-sm btn-outline-success mt-2"
                x-on:click="showNewKey = false; newKey = ''">Dismiss</button>
    </div>

    {% include "admin/_users_table.html" %}
</div>
