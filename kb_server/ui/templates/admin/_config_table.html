<div x-data="configEditor">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <input type="text" class="form-control form-control-sm config-search"
               placeholder="Search config keys..." x-model="search" style="max-width: 300px;">
        <button class="btn btn-outline-danger btn-sm"
                hx-post="/api/v1/config/reset"
                hx-confirm="Reset all config: Reset all configuration to environment defaults? This cannot be undone."
                hx-target="#tab-content" hx-swap="innerHTML">Reset All</button>
    </div>
    <table class="table table-sm table-striped">
        <thead><tr><th>Key</th><th>Value</th><th>Type</th><th>Group</th><th>Updated</th><th></th></tr></thead>
        <tbody>
            <template x-for="entry in filteredConfig" :key="entry.key">
                <tr>
                    <td><code x-text="entry.key"></code></td>
                    <td>
                        <span x-show="editing !== entry.key" x-text="entry.value"
                              data-action="config-start-edit" :data-key="entry.key" :data-value="entry.value" class="editable-field"></span>
                        <input x-show="editing === entry.key" type="text" class="form-control form-control-sm"
                               x-model="editValue"
                               @keydown.enter.prevent="
                                   fetch('/api/v1/config/' + entry.key, {
                                       method: 'PUT',
                                       headers: {'Content-Type': 'application/json'},
                                       body: JSON.stringify({value: editValue})
                                   }).then(r => {
                                       if (r.ok) { editing = ''; loadConfig(); }
                                   });
                               "
                                @keydown.escape.prevent="editing = ''">
                    </td>
                    <td><span class="badge bg-secondary" x-text="entry.type"></span></td>
                    <td><span class="badge bg-info" x-text="entry.group_name"></span></td>
                    <td x-text="entry.updated_at_display"></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" data-action="config-start-edit"
                                :data-key="entry.key" :data-value="entry.value">Edit</button>
                    </td>
                </tr>
            </template>
        </tbody>
    </table>
    <div x-show="filteredConfig.length === 0" class="text-muted">No configuration entries found.</div>
    <div x-show="saveError" class="alert alert-danger mt-2" role="alert" aria-live="assertive" x-text="saveError"></div>
</div>
