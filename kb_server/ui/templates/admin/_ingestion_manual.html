<div class="card">
    <div class="card-body">
        <h3 class="h5 card-title">Manual Ingestion</h3>
        <p class="text-muted small">Enter a directory path to start ingestion.</p>
        <form id="ingest-form" hx-post="/admin/tabs/ingest-trigger"
              hx-target="#ingest-result"
              hx-swap="innerHTML">
            <div class="mb-3">
                <label for="ingest-path" class="form-label">Directory Path</label>
                <input type="text" class="form-control" id="ingest-path" name="path"
                       placeholder="/path/to/docs" required>
            </div>
            <button type="submit" class="btn btn-primary btn-sm">
                <span class="btn-text">Ingest Now</span>
                <span class="spinner-border spinner-border-sm d-none" id="ingest-spinner" role="status" aria-hidden="true"></span>
            </button>
        </form>
        <div id="ingest-result" class="mt-2"></div>
    </div>
</div>

<script nonce="{{ get_nonce(request) }}">
    var ingestForm = document.getElementById('ingest-form');
    if (ingestForm) {
        ingestForm.addEventListener('htmx:beforeRequest', function() {
            var btn = ingestForm.querySelector('button[type="submit"]');
            var spinner = document.getElementById('ingest-spinner');
            var btnText = btn.querySelector('.btn-text');
            btn.disabled = true;
            btnText.classList.add('d-none');
            spinner.classList.remove('d-none');
        });
        ingestForm.addEventListener('htmx:afterRequest', function() {
            var btn = ingestForm.querySelector('button[type="submit"]');
            var spinner = document.getElementById('ingest-spinner');
            var btnText = btn.querySelector('.btn-text');
            btn.disabled = false;
            btnText.classList.remove('d-none');
            spinner.classList.add('d-none');
        });
    }
</script>
