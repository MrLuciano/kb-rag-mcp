<div x-data="profilePage">
    <h3 class="h5">Account</h3>
    <p>Username: <strong x-text="user.username"></strong><br>
       Role: <span class="badge bg-info" x-text="user.role"></span><br>
       Created: <span x-text="user.created_at"></span></p>

    <hr>
    <h3 class="h5">API Keys</h3>
    <div class="mb-2">
        <button class="btn btn-sm btn-primary" @click="generateKey()">Generate New Key</button>
    </div>
    <div x-show="newKey" class="alert alert-success py-2">
        <strong>New API Key:</strong> <code x-text="newKey" class="user-select-all"></code>
        <br><small class="text-muted">Copy this key now — it won't be shown again.</small>
    </div>
    <table class="table table-sm">
        <thead><tr><th>Prefix</th><th>Created</th><th>Status</th><th></th></tr></thead>
        <tbody>
            <template x-for="key in keys" :key="key.id">
                <tr>
                    <td><code x-text="key.prefix"></code></td>
                    <td x-text="key.created_at"></td>
                    <td><span x-text="key.is_revoked ? 'Revoked' : 'Active'" :class="'badge ' + (key.is_revoked ? 'bg-danger' : 'bg-success')"></span></td>
                    <td><button class="btn btn-sm btn-outline-danger" @click="revokeKey(key.id)" x-show="!key.is_revoked">Revoke</button></td>
                </tr>
            </template>
        </tbody>
    </table>

    <hr>
    <h3 class="h5">GDPR</h3>
    <button class="btn btn-sm btn-outline-primary me-2" @click="exportData()">Export My Data (GDPR Art. 20)</button>
    <button class="btn btn-sm btn-outline-danger" @click="requestErasure()">Request Data Erasure</button>
    <div x-show="erasureStatus" class="mt-2">
        <span class="badge bg-warning">Erasure status: <span x-text="erasureStatus"></span></span>
    </div>
</div>
