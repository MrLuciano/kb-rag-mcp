<div x-data="profilePage()" x-init="initProfile()">
    <h3 class="h5">Account</h3>
    <p>Username: <strong x-text="user.username"></strong><br>
       Role: <span class="badge bg-info" x-text="user.role"></span><br>
       Created: <span x-text="user.created_at"></span></p>

    <hr>
    <h3 class="h5">API Keys</h3>
    <div class="mb-2">
        <button class="btn btn-sm btn-primary" @click="generateKey()">Generate New Key</button>
    </div>
    <div x-show="newKey" class="alert alert-success py-2">
        <strong>New API Key:</strong> <code x-text="newKey" class="user-select-all"></code>
        <br><small class="text-muted">Copy this key now — it won't be shown again.</small>
    </div>
    <table class="table table-sm">
        <thead><tr><th>Prefix</th><th>Created</th><th>Status</th><th></th></tr></thead>
        <tbody>
            <template x-for="key in keys" :key="key.id">
                <tr>
                    <td><code x-text="key.prefix"></code></td>
                    <td x-text="key.created_at"></td>
                    <td><span x-text="key.is_revoked ? 'Revoked' : 'Active'" :class="'badge ' + (key.is_revoked ? 'bg-danger' : 'bg-success')"></span></td>
                    <td><button class="btn btn-sm btn-outline-danger" @click="revokeKey(key.id)" x-show="!key.is_revoked">Revoke</button></td>
                </tr>
            </template>
        </tbody>
    </table>

    <hr>
    <h3 class="h5">GDPR</h3>
    <button class="btn btn-sm btn-outline-primary me-2" @click="exportData()">Export My Data (GDPR Art. 20)</button>
    <button class="btn btn-sm btn-outline-danger" @click="requestErasure()">Request Data Erasure</button>
    <div x-show="erasureStatus" class="mt-2">
        <span class="badge bg-warning">Erasure status: <span x-text="erasureStatus"></span></span>
    </div>
</div>

<script nonce="{{ get_nonce(request) }}">
function profilePage() {
    return {
        user: {},
        keys: [],
        newKey: '',
        erasureStatus: '',
        initProfile() {
            var headers = { 'Authorization': 'Bearer ' + localStorage.getItem('kb_api_key') };
            fetch('/api/v1/users/me', { headers: headers })
                .then(r => r.json())
                .then(data => { this.user = data; });
            this.loadKeys();
        },
        loadKeys() {
            if (!this.user.id) return;
            var headers = { 'Authorization': 'Bearer ' + localStorage.getItem('kb_api_key') };
            fetch('/api/v1/api-keys?user_id=' + this.user.id, { headers: headers })
                .then(r => r.json())
                .then(data => { this.keys = data; });
        },
        generateKey() {
            if (!this.user.id) return;
            var headers = { 'Authorization': 'Bearer ' + localStorage.getItem('kb_api_key'), 'Content-Type': 'application/json' };
            fetch('/api/v1/api-keys', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({ user_id: this.user.id, description: 'Admin UI key' })
            })
            .then(r => r.json())
            .then(data => {
                this.newKey = data.raw_key;
                this.loadKeys();
            });
        },
        revokeKey(keyId) {
            if (!confirm('Revoke API key: Are you sure you want to revoke this key? Applications using this key will lose access immediately.')) return;
            var headers = { 'Authorization': 'Bearer ' + localStorage.getItem('kb_api_key') };
            fetch('/api/v1/api-keys/' + keyId, { method: 'DELETE', headers: headers })
                .then(() => { this.loadKeys(); });
        },
        exportData() {
            var headers = { 'Authorization': 'Bearer ' + localStorage.getItem('kb_api_key') };
            fetch('/api/v1/users/' + this.user.id + '/export', { headers: headers })
                .then(r => r.json())
                .then(data => {
                    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = url; a.download = 'my-data-export.json'; a.click();
                    URL.revokeObjectURL(url);
                });
        },
        requestErasure() {
            if (!confirm('Request complete erasure of all your data? This will anonymize your account and revoke all API keys.')) return;
            var headers = { 'Authorization': 'Bearer ' + localStorage.getItem('kb_api_key'), 'Content-Type': 'application/json' };
            fetch('/api/v1/users/' + this.user.id + '/erasure-request', { method: 'POST', headers: headers })
                .then(r => r.json())
                .then(data => { this.erasureStatus = data.status; });
        }
    };
}
</script>
