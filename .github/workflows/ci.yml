name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ --ignore=tests/e2e --ignore=tests/test_sse_handler.py -q --tb=short

      - name: Coverage report
        if: always()
        run: |
          python -m pytest tests/ --ignore=tests/e2e --ignore=tests/test_sse_handler.py --cov=kb_server --cov=ingest --cov-branch --cov-report=term --tb=no -q

      - name: Coverage enforcement
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        run: |
          python -m pytest tests/ --ignore=tests/e2e --ignore=tests/test_sse_handler.py --cov=kb_server --cov=ingest --cov-branch --cov-fail-under=90 --tb=no -q

      - name: SSE handler tests (separate process)
        run: |
          python -m pytest tests/test_sse_handler.py -q --tb=short
